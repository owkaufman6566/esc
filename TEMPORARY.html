<!DOCTYPE html>
<html lang="en">
<head>
<!--    Metadata and other imported stuff-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
<!--title-->
    <title>05</title>
  <style>
    /* Fake terminal styles (self-contained) */
    :root{
      --bg:#071018;
      --panel:#0b1720;
      --muted:#9fb3c8;
      --text:#a6f3e0;
      --accent:#57f0c4;
    }
    html,body{height:100%;margin:0;font-family:"Google Sans",system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:#081216;color:#e6edf3}
    .main{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px}
    .terminal{width:880px;max-width:96%;background:var(--panel);border-radius:10px;box-shadow:0 18px 40px rgba(2,6,23,0.7);overflow:hidden;border:1px solid rgba(255,255,255,0.03)}
    .bar{display:flex;align-items:center;padding:10px 14px;gap:12px;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01))}
    .controls{display:flex;gap:8px}
    .control{width:12px;height:12px;border-radius:50%}
    .red{background:#ff5f56}
    .yellow{background:#ffbd2e}
    .green{background:#27c93f}
    .title{color:var(--muted);font-size:13px;opacity:0.95}
    .content{padding:20px;font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", monospace;font-size:14px;color:var(--text);background:linear-gradient(180deg,rgba(0,0,0,0.02),transparent);min-height:320px}
    .line{white-space:pre-wrap;line-height:1.5}
    .prompt{color:var(--muted);margin-right:8px}
    .cmd{display:inline-block;outline:none;min-width:10px}
    .caret{display:inline-block;width:8px;height:18px;background:var(--text);margin-left:6px;vertical-align:bottom;animation:blink 1s steps(2) infinite;border-radius:2px}
    @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
    .output{color:#cfeee8;margin-top:8px}
    .meta{color:#7ea6ba;font-size:13px;margin-top:6px}
    .small{font-size:12px;color:#88a7b6}
    /* clickable focus style */
    .content:focus-within{box-shadow:0 0 0 3px rgba(87,240,196,0.06);border-radius:8px}
    </style>
</head>
<body>

    <div class="main">
    
        <div class="terminal" role="region" aria-label="Fake terminal window">
            <div class="bar">
                <div class="controls" aria-hidden="true">
                    <div class="control red"></div>
                    <div class="control yellow"></div>
                    <div class="control green"></div>
                </div>
                <div class="title">user@local — Terminal</div>
            </div>

            <div class="content" id="terminal" tabindex="0">
                <div class="line"><span class="prompt" id="prompt">user@mac:~$</span><span class="cmd" id="cmd">ls -la</span><span class="caret" id="caret"></span></div>

                <div class="output" id="output">
                    <!-- initial example content will be replaced by real commands -->
                    <div class="line">total 48</div>
                    <div class="line">drwxr-xr-x  12 user staff   384 Mar 11 12:01 .</div>
                    <div class="line">drwxr-xr-x   6 user staff   192 Mar 10 11:20 ..</div>
                </div>

                <div class="meta small">Click the command to edit. Press Enter to "run". Commands: ls, ls -l, ls -la, cd, pwd, install escos, escos</div>
            </div>
        </div>
    
    </div>

<script>
/* more realistic shell: ls (-l, -a), cd, pwd, install escos, escos run */
const cmdEl = document.getElementById('cmd');
const outEl = document.getElementById('output');
const term = document.getElementById('terminal');
const promptEl = document.getElementById('prompt');

let cwd = ['home','user']; // path segments relative to root
let escosInstalled = false;

/* helpers to build FS nodes with metadata */
function mkFile(content, size, mtime, mode) {
  return { type: 'file', content: content || '', size: size || (content ? content.length : 0), mtime: mtime || Date.now(), mode: mode || '-rw-r--r--' };
}
function mkDir(entries, mtime, mode) {
  return { type: 'dir', entries: entries || {}, mtime: mtime || Date.now(), mode: mode || 'drwxr-xr-x' };
}
function nowMinus(days) { return Date.now() - (days * 24 * 60 * 60 * 1000); }

/* fake realistic filesystem */
const FS = {
  '/': mkDir({
    'bin': mkDir({
      'bash': mkFile('', 102400, nowMinus(200), '-rwxr-xr-x'),
      'ls': mkFile('', 40960, nowMinus(210), '-rwxr-xr-x')
    }),
    'etc': mkDir({
      'hosts': mkFile('127.0.0.1 localhost', 22, nowMinus(400), '-rw-r--r--'),
      'passwd': mkFile('root:x:0:0:root:/root:/bin/bash', 64, nowMinus(1000), '-rw-r--r--')
    }),
    'usr': mkDir({
      'local': mkDir({
        'bin': mkDir({})
      })
    }),
    'var': mkDir({}),
    'tmp': mkDir({}),
    'home': mkDir({
      'user': mkDir({
        '.bashrc': mkFile('# .bashrc', 120, nowMinus(30), '-rw-r--r--'),
        '.profile': mkFile('PATH', 48, nowMinus(60), '-rw-r--r--'),
        '.bash_logout': mkFile('', 0, nowMinus(365), '-rw-r--r--'),
        'README.md': mkFile('Welcome to your home folder', 1024, nowMinus(2), '-rw-r--r--'),
        'src': mkDir({
          'index.js': mkFile('console.log("hi")', 21, nowMinus(10), '-rw-r--r--')
        }, nowMinus(10)),
        'package.json': mkFile('{"name":"demo"}', 48, nowMinus(5), '-rw-r--r--')
      })
    })
  })
};

/* traverse FS given segments array (['home','user'] => /home/user) */
function getNode(pathSegments) {
  let node = FS['/'];
  if (!pathSegments || pathSegments.length === 0) return node;
  for (const seg of pathSegments) {
    if (!seg) continue;
    if (node.type !== 'dir' || !(seg in node.entries)) return null;
    node = node.entries[seg];
  }
  return node;
}

const HOME_PATH = ['home','user'];

function formatCwdDisplay() {
  if (cwd.length >= HOME_PATH.length && HOME_PATH.every((p,i)=>cwd[i]===p)) {
    const rest = cwd.slice(HOME_PATH.length).join('/');
    return rest ? `~/${rest}` : '~';
  }
  return '/' + cwd.join('/');
}
function setPrompt() {
  promptEl.textContent = `user@mac:${formatCwdDisplay()}$`;
}
setPrompt();

function appendLine(text, cls='line') {
  const d = document.createElement('div');
  d.className = cls;
  d.textContent = text;
  outEl.appendChild(d);
  term.scrollTop = term.scrollHeight;
}

/* permissions/mode helpers */
function modeString(node) {
  // node.mode contains leading 'd' for dir or '-' for file in our data — ensure correct
  if (node.type === 'dir') {
    return node.mode.startsWith('d') ? node.mode : 'd' + node.mode.slice(1);
  } else {
    return node.mode.startsWith('-') ? node.mode : '-' + node.mode.slice(1);
  }
}
function formatDate(ts) {
  const d = new Date(ts);
  const month = d.toLocaleString('en-US', { month: 'short' });
  const day = d.getDate().toString().padStart(2,' ');
  const hours = d.getHours().toString().padStart(2,'0');
  const mins = d.getMinutes().toString().padStart(2,'0');
  return `${month} ${day} ${hours}:${mins}`;
}

/* ls implementation with -l and -a support */
function doLs(args) {
  const flags = args.filter(a => a.startsWith('-')).join('');
  const showAll = flags.includes('a');
  const long = flags.includes('l');

  // handle optional path argument
  const pathArg = args.find(a => !a.startsWith('-'));
  let targetSegs;
  if (pathArg) {
    if (pathArg.startsWith('/')) {
      targetSegs = pathArg.split('/').filter(Boolean);
    } else if (pathArg === '~') {
      targetSegs = HOME_PATH.slice();
    } else {
      targetSegs = cwd.slice();
      const parts = pathArg.split('/').filter(Boolean);
      for (const p of parts) {
        if (p === '..') targetSegs.pop();
        else if (p === '.') continue;
        else targetSegs.push(p);
      }
    }
  } else {
    targetSegs = cwd.slice();
  }

  const node = getNode(targetSegs);
  if (!node) { appendLine('ls: cannot access: No such file or directory'); return; }
  if (node.type !== 'dir') {
    // print single file
    if (long) {
      const m = modeString(node);
      appendLine(`${m} 1 user staff ${node.size.toString().padStart(6,' ')} ${formatDate(node.mtime)} ${path.basename ? path.basename(pathArg) : pathArg}`);
    } else {
      appendLine(pathArg || targetSegs[targetSegs.length-1] || '');
    }
    return;
  }

  const entries = Object.keys(node.entries).slice().sort((a,b)=>a.localeCompare(b));
  const visible = entries.filter(name => showAll || !name.startsWith('.'));

  if (long) {
    // when -a include . and .. at top
    if (showAll) {
      appendLine(`${'d'}rwxr-xr-x  1 user staff`.padEnd(22) + ` ${formatDate(node.mtime)} .`);
      appendLine(`${'d'}rwxr-xr-x  1 user staff`.padEnd(22) + ` ${formatDate(node.mtime)} ..`);
    }
    visible.forEach(name => {
      const e = node.entries[name];
      const m = modeString(e);
      const links = '1';
      const owner = 'user';
      const group = 'staff';
      const size = (e.size || 0).toString().padStart(6,' ');
      const date = formatDate(e.mtime || Date.now());
      appendLine(`${m} ${links} ${owner} ${group} ${size} ${date} ${name}`);
    });
  } else {
    // simple column style: join with two spaces
    if (visible.length === 0) { appendLine(''); return; }
    // print multiple columns — simple approach: chunk into rows of up to 6 columns
    const cols = 6;
    const maxLen = Math.max(...visible.map(n=>n.length));
    let row = '';
    visible.forEach((n,i) => {
      row += n.padEnd(maxLen + 2, ' ');
      if ((i+1) % cols === 0) {
        appendLine(row.trimEnd());
        row = '';
      }
    });
    if (row.trim()) appendLine(row.trimEnd());
  }
}

/* simple path helper for printing single-file long listing (fallback) */
const path = {
  basename(p) { const parts = p.split('/').filter(Boolean); return parts.length ? parts[parts.length-1] : '/'; }
};

function runCommand(cmd) {
  if (!cmd) return;
  const raw = cmd.trim();
  appendLine(`$ ${raw}`);
  const parts = raw.split(/\s+/);
  const c = parts[0];

  if (c === 'pwd') {
    const p = '/' + cwd.join('/');
    appendLine(p === '/' ? '/' : p);
    return;
  }

  if (c === 'ls') {
    doLs(parts.slice(1));
    return;
  }

  if (c === 'cd') {
    const target = parts[1] || '~';
    if (target === '~') { cwd = HOME_PATH.slice(); setPrompt(); return; }
    if (target === '/') { cwd = []; setPrompt(); return; }
    let segs;
    if (target.startsWith('/')) segs = target.split('/').filter(Boolean);
    else {
      segs = cwd.slice();
      const add = target.split('/').filter(Boolean);
      for (const s of add) {
        if (s === '..') segs.pop();
        else if (s === '.') continue;
        else segs.push(s);
      }
    }
    const node = getNode(segs);
    if (!node || node.type !== 'dir') { appendLine(`bash: cd: ${target}: No such file or directory`); return; }
    cwd = segs;
    setPrompt();
    return;
  }

  const installCmd = parts.join(' ');
  if (installCmd === 'install escos' || installCmd === 'install ESCOS') {
    const binNode = getNode(['usr','local','bin']);
    if (!binNode) { appendLine('install: cannot create /usr/local/bin'); return; }
    binNode.entries['escos'] = mkFile('# ESCOS shim', 128, Date.now(), '-rwxr-xr-x');
    escosInstalled = true;
    appendLine('ESCOS installed to /usr/local/bin/escos');
    return;
  }

  if (c === 'escos') {
    // search PATH-like: check /usr/local/bin then /bin
    const check = (p) => {
      const node = getNode(p);
      return node && node.entries && node.entries['escos'];
    };
    if (!escosInstalled && !check(['usr','local','bin'])) {
      appendLine('escos: command not found. Try: install escos');
      return;
    }
    appendLine('ESCOS v1.0');
    appendLine('Welcome to ESCOS. Your access code is: 06JW4IQ');
    return;
  }

  appendLine(`bash: ${c}: command not found`);
}

/* UX: make command editable and run on Enter */
term.addEventListener('click', () => {
  cmdEl.contentEditable = "true";
  cmdEl.focus();
  const sel = window.getSelection();
  sel.selectAllChildren(cmdEl);
  sel.collapseToEnd();
});

cmdEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    const cmd = cmdEl.textContent.trim();
    cmdEl.contentEditable = "false";
    runCommand(cmd);
    setTimeout(()=>{ cmdEl.textContent = ''; cmdEl.focus(); cmdEl.contentEditable = "true"; }, 120);
  } else if (e.key === 'Tab') {
    e.preventDefault();
  }
});
</script>

    </div>
</body>
</html>
